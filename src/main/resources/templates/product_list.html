<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品一覧</title>
    <style>
        .logout-area {
            position: absolute;
            top: 10px;
            right: 20px;
        }
    </style>
</head>
<body>
    <div class="logout-area">
        <form th:action="@{/logout}" method="post">
            <button type="submit">ログアウト</button>
        </form>
    </div>
    <h1>商品一覧</h1>
    <table border="1">
        <tr>
            <th>商品名</th>
            <th>商品画像</th>
            <th>在庫数</th>
            <th>単価</th>
        </tr>
        <tr th:each="product : ${products}">
            <td th:text="${product.productName}"></td>
            <td>
                <img th:if="${#ids.seq(product.productId) != null}" th:src="@{'/product/image/' + ${product.productId}}" alt="画像" width="80"/>
            </td>
            <td th:text="${productService.getTotalStock(product.productId)}"></td>
            <td th:text="${product.price}"></td>
        </tr>
    </table>
</body>
</html>
