name: CI-CD to EC2 via ECR and SSM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
  CONTAINER_NAME: ecsite-app
  APP_PORT: "8080"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run unit tests
        run: |
          chmod +x mvnw
          ./mvnw -B test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: meta
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  manual-approval:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.event_name == 'push' }}
    environment:
      name: production-approval
    steps:
      - name: Await manual approval
        run: echo "Manual approval granted. Proceeding to deploy."

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - manual-approval
    if: ${{ needs.build-and-push.result == 'success' && (github.event_name != 'push' || needs.manual-approval.result == 'success') }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 with SSM Run Command
        id: deploy-ssm
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
        run: |
          set -euo pipefail

          commands=(
            "set -euo pipefail"
            "PREV_IMAGE=\$(docker inspect -f '{{.Config.Image}}' ${CONTAINER_NAME} 2>/dev/null || true)"
            "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${IMAGE_URI%%/*}"
            "docker pull ${IMAGE_URI}"
            "docker rm -f ${CONTAINER_NAME} || true"
            "docker ps --filter publish=${APP_PORT} --format '{{.ID}}' | xargs -r docker rm -f"
            "test -f /opt/ecsite/.env || { echo '/opt/ecsite/.env not found'; exit 1; }"
            "docker run -d --name ${CONTAINER_NAME} --restart unless-stopped -p ${APP_PORT}:8080 --env-file /opt/ecsite/.env ${IMAGE_URI}"
            "HEALTH_OK=0"
            "for i in \$(seq 1 18); do code=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:${APP_PORT}/ || true); echo \$code | grep -Eq '^(200|302|401|403)$' && HEALTH_OK=1 && break; sleep 5; done"
            "if [ \$HEALTH_OK -ne 1 ]; then echo 'Health check failed. Starting rollback.'; docker logs --tail 100 ${CONTAINER_NAME} || true; docker rm -f ${CONTAINER_NAME} || true; if [ -n \"\$PREV_IMAGE\" ]; then docker run -d --name ${CONTAINER_NAME} --restart unless-stopped -p ${APP_PORT}:8080 --env-file /opt/ecsite/.env \$PREV_IMAGE; echo \"Rollback completed: \$PREV_IMAGE\"; else echo 'Rollback skipped: previous image not found'; fi; exit 1; fi"
            "docker image prune -f"
          )

          printf '%s\n' "${commands[@]}" | jq -R . | jq -s '{commands: .}' > ssm-commands.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ecsite-app" \
            --parameters file://ssm-commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "Status" \
            --output text)

          echo "SSM command status: ${STATUS}"

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "StandardOutputContent" \
            --output text || true

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "StandardErrorContent" \
            --output text || true

          if [ "${STATUS}" != "Success" ]; then
            echo "Deployment failed"
            exit 1
          fi
