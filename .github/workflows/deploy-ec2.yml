name: CI-CD to EC2 via ECR and SSM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
  CONTAINER_NAME: ecsite-app
  APP_PORT: "8080"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run unit tests
        run: |
          chmod +x mvnw
          ./mvnw -B test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: meta
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 with SSM Run Command
        id: deploy-ssm
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
        run: |
          set -euo pipefail

          cat > ssm-commands.json <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin \\\"${IMAGE_URI%%/*}\\\"",
              "docker pull ${IMAGE_URI}",
              "docker rm -f ${CONTAINER_NAME} || true",
              "if [ ! -f /opt/ecsite/.env ]; then echo '/opt/ecsite/.env not found'; exit 1; fi",
              "docker run -d --name ${CONTAINER_NAME} --restart unless-stopped -p ${APP_PORT}:8080 --env-file /opt/ecsite/.env ${IMAGE_URI}",
              "docker image prune -f"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${IMAGE_URI}" \
            --parameters file://ssm-commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "Status" \
            --output text)

          echo "SSM command status: ${STATUS}"

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "StandardOutputContent" \
            --output text || true

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "StandardErrorContent" \
            --output text || true

          if [ "${STATUS}" != "Success" ]; then
            echo "Deployment failed"
            exit 1
          fi
