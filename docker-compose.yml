version: '3.8'
services:
  db:
    image: postgres:15
    container_name: ecsite-db
    environment:
      POSTGRES_DB: ecsite
      POSTGRES_USER: ecuser
      POSTGRES_PASSWORD: ecpass
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
  app:
    build: .
    container_name: ecsite-app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ecsite
      SPRING_DATASOURCE_USERNAME: ecuser
      SPRING_DATASOURCE_PASSWORD: ecpass
volumes:
  db-data:
